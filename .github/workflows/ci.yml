name: Go CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [ '1.21', '1.22', '1.23' ]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Install dependencies
      run: go mod tidy

    - name: Build
      run: go build -v ./...

    - name: Vet
      run: go vet ./...

  release:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Build for multiple platforms
      run: |
        GOOS=linux GOARCH=amd64 go build -o chat-server-linux-amd64 main.go
        GOOS=darwin GOARCH=amd64 go build -o chat-server-darwin-amd64 main.go
        GOOS=windows GOARCH=amd64 go build -o chat-server-windows-amd64.exe main.go

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          chat-server-linux-amd64
          chat-server-darwin-amd64
          chat-server-windows-amd64.exe
