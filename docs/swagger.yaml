      security:
      - BearerAuth: []
      summary: Включить/выключить микрофон участника
      tags:
      - Голосовые чаты
  /ws:
    get:
      consumes:
      - application/json
      description: "# WebSocket API\n\n## Быстрый старт\n1. Зарегистрируйся: `POST
        /api/auth/register` → получи JWT token\n2. Подключись: `ws://localhost:8080/ws?token={JWT_TOKEN}`\n3.
        Отправляй и получай события в формате `{ \"type\": \"...\", \"payload\": {...}
        }`\n\n- **Пинг/Pong**: сервер шлёт ping каждые 54с, клиент отвечает pong (встроено
        в ws-библиотеку)\n- **Таймаут**: если pong не получен 60с — соединение закрывается\n-
        **Макс. размер сообщения**: 64 КБ\n- **Ограничение**: 100 запросов/мин на
        API (REST + WebSocket суммарно)\n- **Реконнект**: при обрыве клиент должен
        переподключаться с тем же токеном\n\n---\n\n## 1. Сервер → Клиент (входящие
        события)\nСервер автоматически рассылает эти события участникам чата в реальном
        времени.\n\n### 1.1 Сообщения\n\n**`message:new`** — Новое сообщение.\n```json\n{
        \"type\": \"message:new\", \"payload\": { \"id\": \"uuid\", \"chatId\": \"uuid\",
        \"senderId\": \"uuid\", \"content\": \"Привет!\", \"type\": \"text\", \"createdAt\":
        \"2026-01-01T00:00:00Z\" } }\n```\nПоля payload: id, chatId, senderId, content,
        type (text|image|file|gif|voice|video|audio|location), createdAt, replyTo
        (если ответ), forwardedFrom (если переслано).\n\n**`message:edited`** — Сообщение
        отредактировано. Payload: полный объект Message с обновлённым content + editHistory.\n\n**`message:deleted`**
        — Сообщение удалено.\n```json\n{ \"type\": \"message:deleted\", \"payload\":
        { \"messageId\": \"uuid\", \"chatId\": \"uuid\" } }\n```\n\n**`message:read`**
        — Сообщение прочитано другим участником.\n```json\n{ \"type\": \"message:read\",
        \"payload\": { \"messageId\": \"uuid\", \"userId\": \"uuid\", \"chatId\":
        \"uuid\" } }\n```\n\n**`message:reaction`** — Изменение реакций. Payload:
        полный объект Message с обновлённым полем `reactions`.\n\n**`message:pinned`**
        — Сообщение закреплено/откреплено. Payload: полный объект Message.\n\n**`message:starred`**
        — Сообщение добавлено в избранное. Payload: { \"messageId\", \"userId\" }\n\n**`message:forward`**
        — Сообщение переслано. Payload: полный объект Message.\n\n### 1.2 Пользователи\n\n|
        Тип | Описание | Payload |\n|-----|----------|---------|\n| `user:online`
        | Пользователь стал онлайн | `{ \"userId\": \"uuid\", \"online\": true }`
        |\n| `user:offline` | Пользователь стал офлайн | `{ \"userId\": \"uuid\",
        \"online\": false }` |\n| `user:typing` | Пользователь печатает | `{ \"chatId\":
        \"uuid\", \"userId\": \"uuid\" }` |\n| `user:stop_typing` | Перестал печатать
        | `{ \"chatId\": \"uuid\", \"userId\": \"uuid\" }` |\n| `user:keyboard_opened`
        | Клавиатура открыта (моб.) | `{ \"chatId\": \"uuid\", \"userId\": \"uuid\"
        }` |\n| `user:keyboard_closed` | Клавиатура закрыта | `{ \"chatId\": \"uuid\",
        \"userId\": \"uuid\" }` |\n\n### 1.3 Чаты\n\n**`chat:created`** — Создан новый
        чат. Payload: полный объект Chat (id, name, type, participants, avatarUrl,
        description).\n\n**`chat:updated`** — Чат обновлён (название, аватар, участники).
        Payload: полный объект Chat.\n\n**`chat:deleted`** — Чат удалён.\n```json\n{
        \"type\": \"chat:deleted\", \"payload\": { \"chatId\": \"uuid\" } }\n```\n\n###
        1.4 Звонки (WebRTC)\n\n| Тип | Описание | Payload |\n|-----|----------|---------|\n|
        `call:offer` | Входящий звонок (WebRTC offer) | `{ \"chatId\", \"callId\",
        \"callerId\", \"type\" }` |\n| `call:answer` | Ответ на звонок | `{ \"callId\",
        \"userId\" }` |\n| `call:ice` | ICE-кандидат | `{ \"callId\", \"candidate\"
        }` |\n| `call:end` | Звонок завершён | `{ \"callId\", \"userId\" }` |\n| `call:reject`
        | Звонок отклонён | `{ \"callId\", \"userId\" }` |\n| `call:accept` | Звонок
        принят | `{ \"callId\", \"userId\" }` |\n| `call:missed` | Пропущенный звонок
        | `{ \"callId\", \"userId\" }` |\n\n---\n\n## 2. Клиент → Сервер (исходящие
        события)\nОтправляй эти события через WebSocket, чтобы выполнить действия.\n\n###
        2.1 Отправка и управление сообщениями\n\n**`message:send`** — Отправить сообщение
        в чат.\n```json\n{ \"type\": \"message:send\", \"payload\": { \"chatId\":
        \"uuid\", \"content\": \"Привет!\", \"type\": \"text\", \"replyToId\": \"uuid\"
        } }\n```\n\n| Поле | Обязательное | Описание |\n|------|-------------|----------|\n|
        chatId | ✅ | ID чата |\n| content | ✅ | Текст / URL файла / base64 |\n| type
        | ✅ | text, image, file, gif, voice, video, audio, location |\n| replyToId
        | ❌ | ID сообщения, на которое отвечаем |\n\n**`message:edit`** — Редактировать
        сообщение.\n```json\n{ \"type\": \"message:edit\", \"payload\": { \"messageId\":
        \"uuid\", \"content\": \"Новый текст\" } }\n```\n\n**`message:delete`** —
        Удалить сообщение.\n```json\n{ \"type\": \"message:delete\", \"payload\":
        { \"messageId\": \"uuid\", \"chatId\": \"uuid\" } }\n```\n\n**`message:read`**
        — Отметить сообщение как прочитанное.\n```json\n{ \"type\": \"message:read\",
        \"payload\": { \"messageId\": \"uuid\", \"chatId\": \"uuid\" } }\n```\n\n**`message:react`**
        — Добавить реакцию. emoji: \"\U0001F44D\", \"❤️\", \"\U0001F606\", \"\U0001F62E\",
        \"\U0001F622\", \"\U0001F64F\"\n```json\n{ \"type\": \"message:react\", \"payload\":
        { \"messageId\": \"uuid\", \"emoji\": \"\U0001F44D\" } }\n```\n\n**`message:unreact`**
        — Удалить реакцию.\n```json\n{ \"type\": \"message:unreact\", \"payload\":
        { \"messageId\": \"uuid\", \"emoji\": \"\U0001F44D\" } }\n```\n\n**`message:pin`**
        — Закрепить (pin: true) / открепить (pin: false) сообщение.\n```json\n{ \"type\":
        \"message:pin\", \"payload\": { \"messageId\": \"uuid\", \"pin\": true } }\n```\n\n**`message:star`**
        — Добавить в избранное.\n```json\n{ \"type\": \"message:star\", \"payload\":
        { \"messageId\": \"uuid\" } }\n```\n\n**`message:unstar`** — Удалить из избранного.\n```json\n{
        \"type\": \"message:unstar\", \"payload\": { \"messageId\": \"uuid\" } }\n```\n\n**`message:forward`**
        — Переслать сообщение в другой чат.\n```json\n{ \"type\": \"message:forward\",
        \"payload\": { \"messageId\": \"uuid\", \"toChatId\": \"uuid\" } }\n```\n\n###
        2.2 Управление чатами\n\n**`chat:create`** — Создать новый чат.\n```json\n{
        \"type\": \"chat:create\", \"payload\": { \"type\": \"group\", \"name\": \"Friends\",
        \"participantIds\": [\"uuid1\",\"uuid2\"], \"description\": \"Чат для друзей\"
        } }\n```\n| Поле | Обязательное | Описание |\n|------|-------------|----------|\n|
        type | ✅ | \"private\", \"group\", \"channel\" |\n| participantIds | ✅ | Список
        ID участников |\n| name | ❌ | Название (обяз. для group/channel) |\n| description
        | ❌ | Описание чата |\n| avatarUrl | ❌ | Ссылка на аватарку |\n\n**`chat:update`**
        — Обновить название/аватар/описание чата.\n```json\n{ \"type\": \"chat:update\",
        \"payload\": { \"chatId\": \"uuid\", \"name\": \"Новое название\", \"description\":
        \"Описание\", \"avatarUrl\": \"https://...\" } }\n```\n\n**`chat:add_participant`**
        — Добавить участника.\n```json\n{ \"type\": \"chat:add_participant\", \"payload\":
        { \"chatId\": \"uuid\", \"userId\": \"uuid\" } }\n```\n\n**`chat:remove_participant`**
        — Удалить участника.\n```json\n{ \"type\": \"chat:remove_participant\", \"payload\":
        { \"chatId\": \"uuid\", \"userId\": \"uuid\" } }\n```\n\n**`chat:leave`**
        — Покинуть чат.\n```json\n{ \"type\": \"chat:leave\", \"payload\": { \"chatId\":
        \"uuid\" } }\n```\n\n**`chat:pin`** — Закрепить чат в списке.\n```json\n{
        \"type\": \"chat:pin\", \"payload\": { \"chatId\": \"uuid\" } }\n```\n\n**`chat:unpin`**
        — Открепить чат.\n```json\n{ \"type\": \"chat:unpin\", \"payload\": { \"chatId\":
        \"uuid\" } }\n```\n\n**`chat:archive`** — Архивировать чат.\n```json\n{ \"type\":
        \"chat:archive\", \"payload\": { \"chatId\": \"uuid\" } }\n```\n\n**`chat:unarchive`**
        — Разархивировать чат.\n```json\n{ \"type\": \"chat:unarchive\", \"payload\":
        { \"chatId\": \"uuid\" } }\n```\n\n### 2.3 Статус пользователя\n\n**`user:typing`**
        — Индикатор печатания.\n```json\n{ \"type\": \"user:typing\", \"payload\":
        { \"chatId\": \"uuid\" } }\n```\n\n**`user:stop_typing`** — Остановить индикатор.\n```json\n{
        \"type\": \"user:stop_typing\", \"payload\": { \"chatId\": \"uuid\" } }\n```\n\n**`user:keyboard_opened`**
        — Клавиатура открыта (моб.).\n```json\n{ \"type\": \"user:keyboard_opened\",
        \"payload\": { \"chatId\": \"uuid\" } }\n```\n\n**`user:keyboard_closed`**
        — Клавиатура закрыта.\n```json\n{ \"type\": \"user:keyboard_closed\", \"payload\":
        { \"chatId\": \"uuid\" } }\n```\n\n**`user:block`** — Заблокировать пользователя.\n```json\n{
        \"type\": \"user:block\", \"payload\": { \"userId\": \"uuid\" } }\n```\n\n**`user:unblock`**
        — Разблокировать пользователя.\n```json\n{ \"type\": \"user:unblock\", \"payload\":
        { \"userId\": \"uuid\" } }\n```\n\n### 2.4 WebRTC звонки (сигналинг)\n\n**`call:offer`**
        — Отправить WebRTC offer.\n```json\n{ \"type\": \"call:offer\", \"payload\":
        { \"chatId\": \"uuid\", \"callId\": \"uuid\", \"sdp\": \"offer_sdp_string\"
        } }\n```\n\n**`call:answer`** — Ответить на звонок (WebRTC answer).\n```json\n{
        \"type\": \"call:answer\", \"payload\": { \"chatId\": \"uuid\", \"callId\":
        \"uuid\", \"sdp\": \"answer_sdp_string\" } }\n```\n\n**`call:ice`** — Отправить
        ICE-кандидат.\n```json\n{ \"type\": \"call:ice\", \"payload\": { \"callId\":
        \"uuid\", \"candidate\": \"ice_candidate_string\" } }\n```\n\n**`call:reject`**
        — Отклонить звонок.\n```json\n{ \"type\": \"call:reject\", \"payload\": {
        \"callId\": \"uuid\" } }\n```\n\n---\n\n## 3. Полный пример: отправка сообщения\n\n1.
        Клиент А отправляет через WebSocket:\n```json\n{ \"type\": \"message:send\",
        \"payload\": { \"chatId\": \"123\", \"content\": \"Привет!\", \"type\": \"text\"
        } }\n```\n2. Сервер сохраняет в БД и рассылает всем участникам чата:\n```json\n{
        \"type\": \"message:new\", \"payload\": { \"id\": \"msg-uuid\", \"chatId\":
        \"123\", \"senderId\": \"userA-uuid\", \"content\": \"Привет!\", \"type\":
        \"text\", \"createdAt\": \"2026-01-01T00:00:00Z\" } }\n```\n3. Клиент Б получает
        `message:new` и отображает сообщение в реальном времени.\n\n## 4. Полный пример:
        звонок\n\n1. Клиент А отправляет `call:offer` → сервер шлёт `call:offer` всем
        участникам чата\n2. Клиент Б отвечает `call:answer` → сервер шлёт `call:accept`
        всем\n3. Клиенты обмениваются `call:ice` (ICE candidates) через сервер\n4.
        Любая сторона шлёт `call:end` → сервер шлёт `call:end` всем\n"
      parameters:
      - description: JWT token (получить через POST /api/auth/login)
        in: query
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "101":
          description: Upgraded to WebSocket
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: WebSocket соединение
      tags:
      - WebSocket
swagger: "2.0"
