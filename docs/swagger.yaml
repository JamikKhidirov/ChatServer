            $ref: '#/definitions/response.MessageResponse'
        "500":
          description: Failed to send
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Отправить код верификации телефона
      tags:
      - Users
