          должна существовать и иметь тип 'group'.
        in: path
        name: id
        required: true
        type: string
      - description: 'Параметры создания: title (название комнаты, опционально), scheduledInMins
          (отложенный старт через N минут, опционально)'
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/voicechatdomain.CreateVoiceChatRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Голосовая комната создана, возвращает ID, статус и количество
            участников
          schema:
            $ref: '#/definitions/voicechatdomain.VoiceChatResponse'
        "400":
          description: 'Ошибка: чат не найден, это не группа или неверные параметры'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      tags:
      - Голосовые чаты
