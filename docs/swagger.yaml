  /voice-chats/{id}/end:
    post:
      description: Завершает голосовую комнату. После завершения новые участники не
        могут присоединиться. Статус меняется на "ended". Все текущие участники отключаются.
      parameters:
      - description: ID голосовой комнаты
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Голосовая комната завершена
          schema:
            $ref: '#/definitions/response.MessageResponse'
        "400":
          description: 'Ошибка: нет прав на завершение'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      tags:
      - Голосовые чаты
  /voice-chats/{id}/join:
    post:
      description: Позволяет пользователю присоединиться к голосовой комнате. Пользователь
        становится участником и будет отображаться в списке участников комнаты. Не
        требует подтверждения от создателя.
      parameters:
      - description: ID голосовой комнаты
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Пользователь успешно присоединился к голосовой комнате
          schema:
            $ref: '#/definitions/response.MessageResponse'
        "400":
          description: 'Ошибка: комната не найдена или уже завершена'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      tags:
      - Голосовые чаты
  /voice-chats/{id}/leave:
    post:
      description: Отсоединяет пользователя от голосовой комнаты. Пользователь удаляется
        из списка участников, и счётчик участников обновляется.
      parameters:
      - description: ID голосовой комнаты
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Пользователь покинул голосовую комнату
          schema:
            $ref: '#/definitions/response.MessageResponse'
        "400":
          description: 'Ошибка: пользователь не является участником комнаты'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      tags:
      - Голосовые чаты
  /voice-chats/{id}/mute:
    post:
      consumes:
      - application/json
      description: Позволяет участнику включить или выключить свой микрофон в голосовой
        комнате. Администраторы могут отключить микрофон другим участникам.
      parameters:
      - description: ID голосовой комнаты
        in: path
        name: id
        required: true
        type: string
      - description: 'Параметр muted: true (заглушить микрофон) или false (включить
          микрофон)'
        in: body
        name: request
        required: true
        schema:
          properties:
            muted:
              type: boolean
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Статус микрофона изменён (muted/unmuted)
          schema:
            $ref: '#/definitions/response.MessageResponse'
        "400":
          description: Ошибка при изменении статуса
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      tags:
      - Голосовые чаты
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    description: 'Введите JWT токен в формате: Bearer <token>'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
