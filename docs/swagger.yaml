  /chats/{id}/messages/location:
    post:
      consumes:
      - application/json
      description: Создаёт и отправляет в чат сообщение с геолокацией (тип "location").
        Позволяет пользователям делиться своим местоположением на карте. В теле запроса
        обязательно нужно передать широту (latitude) и долготу (longitude) места.
        Опционально можно добавить название места (title), указать ID сообщения для
        ответа (replyToId) и выбрать эффект анимации (effect). После успешной отправки
        возвращается полный объект сообщения с координатами.
      parameters:
      - description: ID чата (группы или личного диалога), в который отправляется
          сообщение с геолокацией
        in: path
        name: id
        required: true
        type: string
      - description: 'Параметры геолокации: latitude (число, широта, обязательно),
          longitude (число, долгота, обязательно), title (строка, название места,
          опционально), replyToId (строка, ID сообщения для ответа, опционально),
          effect (строка, эффект анимации: confetti/fireworks/hearts/balloons/stars,
          опционально)'
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/messagedomain.SendLocationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Сообщение с геолокацией успешно создано. В ответе возвращается
            полный объект MessageResponse с заполненными полями latitude, longitude,
            locationTitle.
          schema:
            $ref: '#/definitions/messagedomain.MessageResponse'
        "400":
          description: 'Ошибка валидации: не указаны latitude/longitude, неверный
            формат данных или чат не найден.'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      tags:
      - Сообщения
