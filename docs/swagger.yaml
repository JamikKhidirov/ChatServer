info:
  contact: {}
paths:
  /account:
    delete:
      description: Полностью удаляет учётную запись пользователя и все связанные данные.
        Это действие необратимо.
      produces:
      - application/json
      responses:
        "200":
          description: Аккаунт успешно удалён
          schema:
            $ref: '#/definitions/response.MessageResponse'
        "400":
          description: Ошибка при удалении аккаунта
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Удалить аккаунт
      tags:
      - Профиль
  /account/settings:
    get:
      description: Возвращает текущие настройки учётной записи пользователя, включая
        параметры приватности и уведомлений.
      produces:
      - application/json
      responses:
        "200":
          description: Настройки аккаунта
          schema:
            $ref: '#/definitions/userdomain.AccountSetting'
        "400":
          description: Ошибка получения настроек
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
