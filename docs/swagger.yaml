  /emojis:
    get:
      description: Возвращает все кастомные эмодзи, загруженные всеми пользователями.
        Подходит для общей галереи эмодзи в клиенте.
      produces:
      - application/json
      responses:
        "200":
          description: Массив всех кастомных эмодзи на сервере
          schema:
            items:
              $ref: '#/definitions/emojidomain.CustomEmojiResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      tags:
      - Кастомные эмодзи
    post:
      consumes:
      - multipart/form-data
      description: Позволяет загрузить собственное изображение эмодзи и задать ему
        короткое имя (shortcode). После загрузки эмодзи можно использовать в чатах.
        Поддерживаются форматы PNG, JPG, GIF (включая анимированные). Файл сохраняется
        в директории uploads/emojis/.
      parameters:
      - description: Короткое имя для эмодзи (например 'party', 'thumbsup', 'cat').
          Будет использоваться в клиенте для вызова эмодзи.
        in: formData
        name: shortcode
        required: true
        type: string
      - description: 'Файл изображения эмодзи (PNG, JPG, GIF). Рекомендуемый размер:
          128x128 пикселей.'
        in: formData
        name: emoji
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Эмодзи успешно создан, возвращает ID, shortcode и URL файла
          schema:
            $ref: '#/definitions/emojidomain.CustomEmojiResponse'
        "400":
          description: 'Ошибка: файл не загружен, shortcode пустой или формат не поддерживается'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      tags:
      - Кастомные эмодзи
  /emojis/{id}:
    delete:
      description: Удаляет эмодзи из базы данных и файл изображения с диска. Только
        владелец эмодзи может его удалить. После удаления эмодзи перестанет отображаться
        в галерее.
      parameters:
      - description: ID эмодзи для удаления
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Эмодзи успешно удалён
          schema:
            $ref: '#/definitions/response.MessageResponse'
        "400":
          description: 'Ошибка: эмодзи не найден или нет прав на удаление'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      tags:
      - Кастомные эмодзи
