      description: Создаёт постоянную голосовую комнату в групповом чате. В отличие
        от группового звонка, голосовая комната может быть активна длительное время
        и не требует принятия вызова. Можно указать название комнаты и время отложенного
        старта. Создатель автоматически присоединяется к комнате.
      parameters:
