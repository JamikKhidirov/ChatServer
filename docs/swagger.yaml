      - application/json
      responses:
        "200":
          description: Эмодзи успешно удалён
          schema:
            $ref: '#/definitions/response.MessageResponse'
        "400":
          description: 'Ошибка: эмодзи не найден или нет прав на удаление'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
