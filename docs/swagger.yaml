host: localhost:8080
info:
  contact:
    email: support@chatserver.local
    name: API Support
    url: http://localhost:8080/support
  description: 'Сервер мессенджера на Go. Поддерживает: личные и групповые чаты, голосовые
    и видеозвонки, stories, голосовые комнаты, каналы, стикеры, опросы, ботов, геолокацию,
    кастомные эмодзи, эффекты сообщений, избранное и многое другое.'
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://localhost:8080/terms
  title: Chat Messenger API
  version: 2.0.0
paths:
  /account:
    delete:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.MessageResponse'
        "400":
          description: Deletion failed
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      tags:
      - Users
  /account/settings:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/userdomain.AccountSetting'
        "400":
